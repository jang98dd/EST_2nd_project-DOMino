<main class="join">

  <section class="auth__intro">

    <h2 class="auth__title">
      Find the Frame<br>
      that fits your style.
    </h2>

    <p class="auth__desc">
      당신에게 가장 잘 어울리는 안경을 찾아보세요.
    </p>

  </section>

  <form class="join-form">

    <div class="radio-group">

      <label>
        <input type="radio" name="gender">
        내국인
      </label>

      <label>
        <input type="radio" name="gender">
        외국인(foreigner)
      </label>

    </div>

    <div class="radio-group">

      <label>
        <input type="radio" name="adult">
        미성년자
      </label>

      <label>
        <input type="radio" name="adult">
        성인
      </label>

    </div>

    <div class="form-group">
      <label>이름</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>이메일</label>
      <input type="email">
    </div>

    <div class="form-group">
      <label>비밀번호</label>

      <div class="input-password">
        <input type="password">
        <button type="button">👁</button>
      </div>

    </div>

    <div class="form-group">
      <label>비밀번호 확인</label>

      <div class="input-password">
        <input type="password">
        <button type="button">👁</button>
      </div>

    </div>

    <div class="form-group">
      <label>휴대폰 번호</label>

      <div class="phone-group">

        <input class="phone-prefix" value="010" readonly>

        <input type="tel" placeholder="번호를 입력해주세요">

      </div>

    </div>

    <div class="form-group">

      <label>생년월일</label>

      <input type="date">

    </div>

    <div class="radio-group">

      <label>
        <input type="radio" name="sex">
        남성
      </label>

      <label>
        <input type="radio" name="sex">
        여성
      </label>

    </div>

    <div class="check-group">

      <label>
        <input type="checkbox">
        이벤트 및 마케팅 수신 동의
      </label>

      <label>
        <input type="checkbox">
        개인정보 수집 이용 동의
      </label>

    </div>

    <button type="submit" class="btn-join">
      회원가입
    </button>

  </form>

</main>
<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/auth.css">
