<main class="auth auth--signup">

  <section class="auth__intro">
    ...
  </section>

  <section class="auth__form">

    <form id="signupForm">

      <div class="form-group">

        <label>이름 *</label>

        <input type="text">

      </div>

      <div class="form-group">

        <label>이메일 *</label>

        <input id="email">

        <p class="error-message">
          이메일은 반드시 @를 포함하여 작성하시오
        </p>

      </div>

      <div class="form-group">

        <label>비밀번호 *</label>

        <input id="password">

        <p class="error-message">
          사용자 이름을 포함해서 작성하지 마시오
        </p>

      </div>

      <div class="form-group">

        <label>비밀번호 확인 *</label>

        <input id="passwordCheck">

        <p class="error-message">
          위의 비밀번호와 동일하게 작성하시오
        </p>

      </div>

      <button class="btn-black">
        회원가입
      </button>

    </form>

  </section>

</main>
