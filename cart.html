<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOMINO - 장바구니</title>
  <link rel="stylesheet" href="styles/reset.css" />
  <link rel="stylesheet" href="styles/normalize.css" />
  <link rel="stylesheet" href="styles/common.css" />
  <link rel="stylesheet" href="styles/cart.css">
</head>
<body>
  <header class="header">
  </header>

  <main class="page cart-container">
    <div class="cart-content-wrapper">
      <!-- 페이지 제목 -->
      <div class="cart-header">
        <h1 class="page-title">장바구니</h1>
      </div>

      <!-- 장바구니 메인 콘텐츠 -->
      <div class="cart-layout">
        <!-- 상품 목록 영역 -->
        <section class="cart-products">
          <!-- 전체 선택 체크박스 -->
          <div class="cart-header-controls">
            <label class="checkbox-wrapper">
              <input type="checkbox" id="select-all" class="select-all-checkbox" />
              <span class="checkbox-label">전체선택</span>
            </label>
            <button class="delete-all-btn" id="delete-selected">선택삭제</button>
          </div>

          <!-- 상품 카드 목록 -->
          <div class="products-list" id="products-list">
            <div class="product-card" data-id="1">
              <input class="product-checkbox" type="checkbox" />
              <div class="product-image">
                <img src="assets/placeholder.jpg" alt="선글라스" />
              </div>
              <div class="product-details">
                <h3 class="product-name">선글라스</h3>
                <p class="product-description">고급 스타일의 자외선 차단 선글라스</p>
                <div class="product-price-row">
                  <span class="product-price">39,000원</span>
                </div>
                <div class="quantity-controls">
                  <button class="qty-btn qty-decrease" aria-label="수량 감소">−</button>
                  <span class="qty-value" data-id="qty-1">1</span>
                  <button class="qty-btn qty-increase" aria-label="수량 증가">+</button>
                </div>
              </div>
              <button class="product-remove" aria-label="제품 제거">×</button>
            </div>

            <div class="product-card" data-id="2">
              <input class="product-checkbox" type="checkbox" />
              <div class="product-image">
                <img src="assets/placeholder.jpg" alt="모자" />
              </div>
              <div class="product-details">
                <h3 class="product-name">스포츠 모자</h3>
                <p class="product-description">편안한 착용감의 스포츠 모자</p>
                <div class="product-price-row">
                  <span class="product-price">29,000원</span>
                </div>
                <div class="quantity-controls">
                  <button class="qty-btn qty-decrease" aria-label="수량 감소">−</button>
                  <span class="qty-value" data-id="qty-2">2</span>
                  <button class="qty-btn qty-increase" aria-label="수량 증가">+</button>
                </div>
              </div>
              <button class="product-remove" aria-label="제품 제거">×</button>
            </div>
          </div>

          <!-- 빈 장바구니 메시지 -->
          <div class="empty-cart" style="display: none;">
            <p>장바구니가 비어있습니다.</p>
            <a href="product-list.html" class="empty-cart-link">쇼핑 계속하기</a>
          </div>
        </section>

        <!-- 결제 정보 영역 (모바일: sticky, 데스크톱: sidebar) -->
        <aside class="cart-summary">
          <div class="summary-card">
            <!-- 결제정보 영역 (좌측) -->
            <div class="summary-info">
              <h2 class="summary-title">주문 요약</h2>
              
              <div class="summary-row">
                <span class="summary-label">상품금액</span>
                <span class="summary-value" id="subtotal">97,000원</span>
              </div>

              <div class="summary-row">
                <span class="summary-label">배송료</span>
                <span class="summary-value" id="shipping">3,000원</span>
              </div>

              <div class="summary-row discount" id="discount-row" style="display: none;">
                <span class="summary-label">할인</span>
                <span class="summary-value discount-value" id="discount">−10,000원</span>
              </div>

              <div class="summary-divider"></div>

              <div class="summary-row total">
                <span class="summary-label">최종 결제금액</span>
                <span class="summary-value total-value" id="total">100,000원</span>
              </div>
            </div>

            <!-- 결제 버튼 영역 (우측) -->
            <div class="summary-actions">
              <button class="checkout-btn" id="checkout-btn">구매하기</button>
              <button class="continue-shopping-btn">쇼핑 계속하기</button>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <footer class="footer">
  </footer>

  <script type="module" src="js/modules/cart.js"></script>
</body>
</html>
