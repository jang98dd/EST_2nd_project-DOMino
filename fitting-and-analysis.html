<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상품목록</title>

    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/normalize.css" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/fitting-and-anaylsis.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="app">
      <header class="header" role="banner">
        <div class="header__left">
          <h1 class="header__logo">
            <a href="/index.html" aria-label="ROUNZ 홈">ROUNZ</a>
          </h1>
        </div>

        <div class="header__right">
          <div class="header__actions">
            <button type="button" class="icon-btn" aria-label="검색 열기">
              <span class="material-icons" aria-hidden="true">search</span>
            </button>

            <button
              type="button"
              class="icon-btn"
              aria-label="장바구니, 현재 1개 상품"
            >
              <span class="material-icons" aria-hidden="true"
                >shopping_bag</span
              >
              <span class="cart-badge" aria-hidden="true">1</span>
            </button>

            <button
              type="button"
              class="icon-btn"
              aria-label="전체 메뉴 열기"
              aria-expanded="false"
              aria-controls="global-nav"
            >
              <span class="material-icons" aria-hidden="true">menu</span>
            </button>
          </div>
        </div>
      </header>
      <main class="page page--product-list service-container" role="main">
        <div class="page__inner">
          <nav class="page-header mobile-tabs" aria-label="페이지 위치">
            <button class="tab-btn active" data-target="fitting">피팅</button>
            <button
            type="button"
            class="back-btn"
            aria-label="이전 페이지로 이동"
            hidden>
            <span class="material-icons" aria-hidden="true"
            >chevron_left</span
            >
          </button>
          
          <h2 class="page-title">EYEGLASSES</h2>
          
            <button class="tab-btn" data-target="analysis">비교/분석</button>
            <div class="page-header__spacer" aria-hidden="true" hidden></div>
          </nav>
          <div class="content-wrapper">
      <section id="fitting" class="section-panel active">
        <div class="fitting-grid">
          <div class="preview-box" id="previewBox">
            <div class="image-frame">
              <img id="uploadedImage" src="" alt="피팅 이미지" style="display: none;">
              <div class="glasses-guide"></div>
            </div>
            <div class="upload-placeholder" id="uploadPlaceholder">
              <p>사진 업로드</p>
              <input type="file" id="fileInput" accept="image/*" class="sr-only">
            </div>
          </div>

          <div class="control-box">
            <div class="slider-group">
              <div class="slider-item"><label>X축</label><input type="range" id="slideX" class="custom-range" min="-150" max="150" value="0"><span class="val">0px</span></div>
              <div class="slider-item"><label>Y축</label><input type="range" id="slideY" class="custom-range" min="-150" max="150" value="0"><span class="val">0px</span></div>
              <div class="slider-item"><label>크기</label><input type="range" id="slideScale" class="custom-range" min="50" max="200" value="100"><span class="val">100%</span></div>
              <div class="slider-item"><label>회전</label><input type="range" id="slideRotate" class="custom-range" min="-180" max="180" value="0"><span class="val">0°</span></div>
            </div>
            <button class="btn btn-solid w-100" id="startAnalysisBtn">분석 시작</button>
          </div>
        </div>
      </section>

      <section id="analysis" class="section-panel">
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
  <div class="gauge-box">
    <h3>얼굴형 분석 중...</h3>
    <div class="circle-gauge">
      <svg width="120" height="120">
        <circle cx="60" cy="60" r="50" fill="none" stroke="#eee" stroke-width="8"/>
        <circle id="progressCircle" cx="60" cy="60" r="50" fill="none" stroke="#0B1E4A" stroke-width="8" 
                stroke-dasharray="314" stroke-dashoffset="314" stroke-linecap="round" 
                transform="rotate(-90 60 60)"/>
      </svg>
      <p id="progressText">0%</p>
    </div>
  </div>
</div>

        <div class="analysis-bottom" id="analysisResult" style="opacity: 0;">
          <div class="radar-chart-area">
            <div class="custom-rader-container">
              <svg viewBox="0 0 100 100" class="svg-radar">
                <g id="radar-bg"></g>
                <polygon id="radar-data" fill="rgba(11, 30, 74, 0.3)" stroke="#0B1E4A" stroke-width="1.5" points="50,50 50,50 50,50 50,50 50,50"></polygon>
              </svg>
            </div>
            <div id="radar-labels"></div>
          </div>
          <div class="analysis-info">
            <h2 id="resultTitle">분석 결과</h2>
            <p>달걀형 얼굴에 최적화된 프레임을 추천합니다.</p>
          </div>
        </div>
      </section>
    </div>
  </main>
  <script type="module" src="js/pages/fitting-and-analysis.js"></script>
</body>
</html>
