<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상품목록</title>
  <link rel="stylesheet" href="styles/common.css"/>
  <link rel="stylesheet" href="styles/product-list.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
</head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header__left">
          <h1 class="header__logo">
            <a href="/" aria-label="ROUNZ 홈">ROUNZ</a>
          </h1>
        </div>

        <div class="header__right">
          <div class="header__utility">
            <button type="button" class="icon-btn" aria-label="검색 열기">
              <span class="material-icons" aria-hidden="true">search</span>
            </button>

            <button
              type="button"
              class="icon-btn"
              aria-label="장바구니, 현재 1개 상품"
            >
              <span class="material-icons" aria-hidden="true"
                >shopping_bag</span
              >
              <span class="cart-badge" aria-hidden="true">1</span>
            </button>
          </div>

          <button
            type="button"
            class="header__toggle icon-btn"
            aria-label="메뉴 열기"
            aria-expanded="false"
            aria-controls="global-nav"
          >
            <span class="material-icons" aria-hidden="true">menu</span>
          </button>
        </div>
      </header>
      <main class="page page--product-list">
        <nav class="page-header" aria-label="페이지 위치">
          <button
            type="button"
            class="back-btn"
            aria-label="이전 페이지로 이동"
          >
            <span class="material-icons">chevron_left</span>
          </button>

          <h2 class="page-title">EYEGLASSES</h2>
          <div class="page-header__spacer" aria-hidden="true"></div>
        </nav>
        <section class="product-toolbar" aria-label="상품 정렬 및 정보">
          <div class="sort-dropdown">
            <button class="sort-trigger" id="sortTrigger">
              인기순 <span class="material-icons">keyboard_arrow_down</span>
            </button>

            <ul class="sort-menu" id="sortMenu">
              <li data-sort="popular">인기순</li>
              <li data-sort="newest">최신순</li>
              <li data-sort="priceLow">낮은가격순</li>
              <li data-sort="priceHigh">높은가격순</li>
            </ul>
          </div>
          <p class="product-count">
            <span class="sr-only">전체 상품 수</span>
            100개의 상품
          </p>
        </section>
        <section class="product-list" aria-label="상품 목록">
          <h2 class="sr-only">상품 목록</h2>
          <div class="skeleton-list">
            <article class="skeleton-card"></article>
            <article class="skeleton-card"></article>
            <article class="skeleton-card"></article>
            <article class="skeleton-card"></article>
          </div>
          <div class="product-cards grid grid--2" aria-live="polite"></div>
        <button type="button" class="btn-more btn-action">
          더보기
        </button>
      </section>
      </main>
      <div class="floating-actions filter-btn-group">
        <button class="btn btn-action filter-btn" id="openFilter">
          <span class="material-icons">filter_alt</span>
          필터 (0)
        </button>
        <button class="btn btn-action filter-btn" id="openFilter">
          <img src="assets/icons/frame_round.svg" alt="">
          함께 보면 좋은 프레임
        </button>
      </div>
      <div class="bottom-sheet" id="filterSheet">
        <div class="bottom-sheet__backdrop"></div>
        <div class="bottom-sheet__panel">
          <div class="handle"></div>
          <header class="filter-header">
            <h2 class="filter-title">필터</h2>
            <button class="material-icons">close</button>
          </header>
          <div class="filter-body">
            <section class="filter-group">
              <h3>모양</h3>
              <ul class="chip-grid" role="group" aria-label="안경 프레임 필터">
                <li class="frame-list__item btn-list">
                  <button
                    class="btn-utility frame-option"
                    aria-pressed="false"
                    aria-label="라운드 프레임 선택"
                  >
                    <img
                      src="assets/icons/frame_round.svg"
                      alt=""
                      aria-hidden="true"
                    />
                    <span class="frame-option__label">라운드</span>
                  </button>
                </li>

                <li class="frame-list__item btn-list">
                  <button
                    class="btn-utility frame-option"
                    aria-pressed="false"
                    aria-label="스퀘어 프레임 선택"
                  >
                    <img
                      src="assets/icons/frame_square.svg"
                      alt=""
                      aria-hidden="true"
                    />
                    <span class="frame-option__label">스퀘어</span>
                  </button>
                </li>
                <li class="frame-list__item btn-list">
                  <button
                    class="btn-utility frame-option"
                    aria-pressed="false"
                    aria-label="보잉 프레임 선택"
                  >
                    <img
                      src="assets/icons/frame_browline.svg"
                      alt=""
                      aria-hidden="true"
                    />
                    <span class="frame-option__label">보잉</span>
                  </button>
                </li>
                <li class="frame-list__item btn-list">
                  <button
                    class="btn-utility frame-option"
                    aria-pressed="false"
                    aria-label="하금테 프레임 선택"
                  >
                    <img
                      src="assets/icons/frame_aviator.svg"
                      alt=""
                      aria-hidden="true"
                    />
                    <span class="frame-option__label">하금테</span>
                  </button>
                </li>
                <li class="frame-list__item btn-list">
                  <button
                    class="btn-utility frame-option"
                    aria-pressed="false"
                    aria-label="캣아이 프레임 선택"
                  >
                    <img
                      src="assets/icons/frame_cat-eye.svg"
                      alt=""
                      aria-hidden="true"
                    />
                    <span class="frame-option__label">캣아이</span>
                  </button>
                </li>
                <li class="frame-list__item btn-list">
                  <button
                    class="btn-utility frame-option"
                    aria-pressed="false"
                    aria-label="고글 프레임 선택"
                  >
                    <img
                      src="assets/icons/frame_goggle.svg"
                      alt=""
                      aria-hidden="true"
                    />
                    <span class="frame-option__label">고글</span>
                  </button>
                </li>
                <li class="frame-list__item btn-list">
                  <button
                    class="btn-utility frame-option"
                    aria-pressed="false"
                    aria-label="믹스 프레임 선택"
                  >
                    <img
                      src="assets/icons/frame_mix.svg"
                      alt=""
                      aria-hidden="true"
                    />
                    <span class="frame-option__label">믹스</span>
                  </button>
                </li>
                <li class="frame-list__item btn-list">
                  <button
                    class="btn-utility frame-option"
                    aria-pressed="false"
                    aria-label="기타 프레임 선택"
                  >
                    <img
                      src="assets/icons/frame_other.svg"
                      alt=""
                      aria-hidden="true"
                    />
                    <span class="frame-option__label">기타</span>
                  </button>
                </li>
              </ul>
            </section>
            <section class="filter-group">
              <h3>성별</h3>
              <ul class="chip-grid">
                <li class="btn-list">
                  <button class="btn-utility chip is-active">공용</button>
                </li>
                <li class="btn-list">
                  <button class="btn-utility chip">남성</button>
                </li>
                <li class="btn-list">
                  <button class="btn-utility chip">여성</button>
                </li>
              </ul>
            </section>
            <section class="filter-group">
              <h3>프레임 크기</h3>
              <ul class="chip-grid">
                <li class="btn-list">
                  <button class="btn-utility chip is-active">S</button>
                </li>
                <li class="btn-list">
                  <button class="btn-utility chip">M</button>
                </li>
                <li class="btn-list">
                  <button class="btn-utility chip">L</button>
                </li>
              </ul>
            </section>
            <section class="filter-group">
              <h3>색상</h3>
              <div class="color-grid">
                <button class="color-dot btn-chip"></button>
                <button class="color-dot btn-chip"></button>
                <button class="color-dot btn-chip"></button>
                <button class="color-dot btn-chip"></button>
                <button class="color-dot btn-chip"></button>
                <button class="color-dot btn-chip"></button>
              </div>
            </section>
            <section class="filter-group">
              <h3>가격</h3>

              <div class="price-filter">
                <div class="price-current">
                  <span>₩0</span>
                  <span>₩500,000</span>
                </div>

                <input
                  type="range"
                  class="price-range"
                  min="0"
                  max="500000"
                  step="10000"
                  value="500000"
                  aria-label="최대 가격 선택"
                />

                <div class="price-labels">
                  <span>0원</span>
                  <span>10만</span>
                  <span>20만</span>
                  <span>30만</span>
                  <span>40만</span>
                  <span>50만+</span>
                </div>
              </div>
            </section>
          </div>
          <footer class="filter-footer">
            <button class="btn btn-action btn-reset">
              초기화
            </button>
            <button class="btn btn-action btn-filter-apply">
              필터 적용
            </button>
        </footer>
        
      </div>
    </div>
  </body>
  <script type="module" src="../js/pages/productList.js"></script>
</html>
