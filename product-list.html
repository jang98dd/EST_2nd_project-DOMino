<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상품목록</title>
    <meta name="description" content="라운드, 스퀘어, 보잉 등 다양한 안경테와 선글라스를 한곳에서. 얼굴형과 취향에 맞는 프레임을 ROUNZ에서 찾아보세요." />

    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/normalize.css" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/product-list.css" />
    <link rel="stylesheet" href="styles/header.css" />
    <link rel="stylesheet" href="styles/footer.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="app">
      <div id="header-root"></div>
      <main class="page page--product-list">
        <div class="page__inner">
          <nav class="page-header" aria-label="페이지 위치">
            <a
              href="index.html"
              class="back-btn"
              aria-label="이전 페이지로 이동"
            >
              <span class="material-icons" aria-hidden="true"
                >chevron_left</span
              >
            </a>

            <h2 class="page-title">EYEGLASSES</h2>

            <div class="page-header__spacer" aria-hidden="true"></div>
          </nav>
          <div class="product-layout">
            <aside class="filter-sidebar right-border">
              <section class="filter-group" aria-label="모양 필터">
                <h3>모양</h3>

                <ul class="chip-grid">
                  <li>
                    <label>
                      <input
                        type="checkbox"
                        data-filter-type="shape"
                        value="all"
                        data-role="all"
                      />
                      전체
                    </label>
                  </li>

                  <li>
                    <label>
                      <input
                        type="checkbox"
                        data-filter-type="shape"
                        value="round"
                      />
                      라운드
                    </label>
                  </li>

                  <li>
                    <label>
                      <input
                        type="checkbox"
                        data-filter-type="shape"
                        value="boeing"
                      />
                      보잉
                    </label>
                  </li>

                  <li>
                    <label>
                      <input
                        type="checkbox"
                        data-filter-type="shape"
                        value="goggle"
                      />
                      고글
                    </label>
                  </li>

                  <li>
                    <label>
                      <input
                        type="checkbox"
                        data-filter-type="shape"
                        value="cat-eye"
                      />
                      캣아이
                    </label>
                  </li>
                </ul>
              </section>
              <section class="filter-group" aria-label="성별 필터">
                <h3>성별</h3>

                <ul class="chip-grid">
                  <li>
                    <label>
                      <input
                        type="radio"
                        name="gender"
                        data-gender
                        value="all"
                        checked
                      />
                      공용
                    </label>
                  </li>

                  <li>
                    <label>
                      <input
                        type="radio"
                        name="gender"
                        data-gender
                        value="male"
                      />
                      남성
                    </label>
                  </li>

                  <li>
                    <label>
                      <input
                        type="radio"
                        name="gender"
                        data-gender
                        value="female"
                      />
                      여성
                    </label>
                  </li>
                </ul>
              </section>
              <section class="filter-group" aria-label="프레임 크기">
                <h3>프레임 크기</h3>

                <ul class="chip-grid">
                  <li>
                    <label>
                      <input
                        type="checkbox"
                        data-filter-type="size"
                        value="all"
                        data-role="all"
                      />
                      전체
                    </label>
                  </li>

                  <li>
                    <label>
                      <input
                        type="checkbox"
                        data-filter-type="size"
                        value="S"
                      />
                      S
                    </label>
                  </li>

                  <li>
                    <label>
                      <input
                        type="checkbox"
                        data-filter-type="size"
                        value="M"
                      />
                      M
                    </label>
                  </li>

                  <li>
                    <label>
                      <input
                        type="checkbox"
                        data-filter-type="size"
                        value="L"
                      />
                      L
                    </label>
                  </li>
                </ul>
              </section>
              <section class="filter-group" aria-label="색상 필터">
                <h3>색상</h3>

                <div class="color-grid">
                  <button
                    type="button"
                    value="all"
                    hidden
                    data-role="all"
                    data-filter-type="color"
                    class="custom-btn color-dot"
                    aria-label="전체"
                  >전체</button>
                  <button
                    data-filter-type="color"
                    aria-pressed="false"
                    type="button"
                    data-filter-value="black"
                    class="color-dot custom-btn"
                    aria-label="검정색"
                  ></button>
                  <button
                    data-filter-type="color"
                    aria-pressed="false"
                    type="button"
                    data-filter-value="clear"
                    class="color-dot custom-btn"
                    aria-label="투명"
                  ></button>
                  <button
                    data-filter-type="color"
                    aria-pressed="false"
                    type="button"
                    data-filter-value="gold"
                    class="color-dot custom-btn"
                    aria-label="골드"
                  ></button>
                  <button
                    data-filter-type="color"
                    aria-pressed="false"
                    type="button"
                    data-filter-value="silver"
                    class="color-dot custom-btn"
                    aria-label="실버"
                  ></button>
                </div>
              </section>
              <section class="filter-group" aria-label="가격 필터">
                <h3>가격</h3>

                <div class="price-filter">
                  <div class="price-current" aria-live="polite">
                    <span>₩0</span>
                    <span>₩</span>
                  </div>
                  <label for="priceMaxSidebar" class="sr-only"></label>
                  <input
                    type="range"
                    id="priceMaxSidebar"
                    min="0"
                    max="53150000"
                    step="10000"
                    value="53150000"
                    aria-label="최대 가격 선택"
                  />
                </div>
              </section>
            </aside>

            <div class="product-content">
              <section class="product-toolbar" aria-label="상품 정렬 및 개수">
                <div class="sort-dropdown">
                  <button
                    class="sort-trigger"
                    type="button"
                    aria-haspopup="listbox"
                    aria-expanded="false"
                    aria-controls="sortMenu"
                    id="sortTrigger"
                  >
                    인기순
                    <span class="material-icons" aria-hidden="true"
                      >keyboard_arrow_down</span
                    >
                  </button>

                  <ul
                    class="sort-menu"
                    id="sortMenu"
                    role="listbox"
                    aria-labelledby="sortTrigger"
                  >
                    <li role="option" data-sort="popular">인기순</li>
                    <li role="option" data-sort="newest">최신순</li>
                    <li role="option" data-sort="priceLow">낮은가격순</li>
                    <li role="option" data-sort="priceHigh">높은가격순</li>
                  </ul>
                </div>

                <p class="product-count" aria-live="polite">
                  <span class="sr-only">전체 상품 수</span>
                </p>
              </section>
              <div class="active-filters"></div>
              <section class="product-list" aria-label="상품 목록">
                <h1 class="sr-only">상품 목록</h1>
                <div
                  class="product-cards grid grid--2"
                  aria-live="polite"
                ></div>
                <nav class="pagination" aria-label="페이지 이동"></nav>
              </section>
              <button
                type="button"
                class="btn--action btn-more btn-more--mobile"
                aria-label="더 많은 상품 불러오기"
              >
                더 보기
                <span class="material-icons">chevron_right</span>
              </button>
            </div>
          </div>
        </div>
        <section class="frame-slider" aria-label="추천 상품">
          <div class="top-border">
            <div class="frame-header">
              <div class="frame-header__title">
                <h2 class="frame-title">함께 보면 좋은 프레임</h2>
              </div>
            </div>
            <div class="frame-track">
              <article class="frame-card">
                <h3 class="sr-only">추천 프레임</h3>
              </article>

              <article class="frame-card">
                <h3 class="sr-only">추천 프레임</h3>
              </article>
              <article class="frame-card">
                <h3 class="sr-only">추천 프레임</h3>
              </article>
              <article class="frame-card">
                <h3 class="sr-only">추천 프레임</h3>
              </article>
            </div>
          </div>
        </section>
      </main>
      <section class="fab-group" aria-label="필터 및 추천">
        <button
          class="btn btn--action btn--filter"
          type="button"
          id="openFilter"
          aria-controls="filterSheet"
          aria-expanded="false"
        >
          <span class="material-icons" aria-hidden="true">filter_alt</span>
          필터 (<span class="filter-count">0</span>)
        </button>
      </section>
      <div
        class="bottom-sheet"
        id="filterSheet"
        role="dialog"
        aria-modal="true"
        hidden
        aria-labelledby="filterTitle"
      >
        <div class="bottom-sheet__backdrop" data-close="filter"></div>

        <div class="bottom-sheet__panel">
          <div class="handle" aria-hidden="true"></div>

          <header class="filter-header">
            <div></div>
            <h2 class="filter-title" id="filterTitle">필터</h2>

            <button
              class="close-btn icon-btn"
              type="button"
              aria-label="필터 닫기"
              data-close="filter"
            >
              <span class="material-icons" aria-hidden="true">close</span>
            </button>
          </header>
          <div class="filter-body">
            <section class="filter-group" aria-label="모양 필터">
              <h3>모양</h3>

              <ul class="chip-grid">
                <li>
                  <button
                    type="button"
                    data-filter-type="shape"
                    value="all"
                    data-filter-value="all"
                    data-role="all"
                  >
                    전체
                  </button>
                </li>
                <li>
                  <button
                    class="btn-utility"
                    data-filter-type="shape"
                    data-filter-value="round"
                  >
                    <img
                      src="./assets/icons/frame_round.svg"
                      alt="라운드 프레임"
                    />
                    <span class="btn-label">라운드</span>
                  </button>
                </li>
                <li>
                  <button
                    class="btn-utility"
                    data-filter-type="shape"
                    data-filter-value="boeing"
                  >
                    <img
                      src="./assets/icons/frame_browline.svg"
                      alt="보잉 프레임"
                    />
                    <span class="btn-label">보잉</span>
                  </button>
                </li>
                <li>
                  <button
                    class="btn-utility"
                    data-filter-type="shape"
                    data-filter-value="goggle"
                  >
                    <img
                      src="./assets/icons/frame_goggle.svg"
                      alt="고글 프레임"
                    />
                    <span class="btn-label">고글</span>
                  </button>
                </li>
                <li>
                  <button
                    class="btn-utility"
                    data-filter-type="shape"
                    data-filter-value="cat-eye"
                  >
                    <img
                      src="./assets/icons/frame_cat-eye.svg"
                      alt="캣아이 프레임"
                    />
                    <span class="btn-label">캣아이</span>
                  </button>
                </li>
              </ul>
            </section>
            <section class="filter-group" aria-label="성별 필터">
              <h3>성별</h3>
              <ul class="chip-grid">
                <li>
                  <button
                    class="btn-utility"
                    data-gender="all"
                    aria-pressed="true"
                  >
                    공용
                  </button>
                </li>
                <li>
                  <button
                    class="btn-utility"
                    data-gender="male"
                    aria-pressed="false"
                  >
                    남성
                  </button>
                </li>
                <li>
                  <button
                    class="btn-utility"
                    data-gender="female"
                    aria-pressed="false"
                  >
                    여성
                  </button>
                </li>
              </ul>
            </section>
            <section class="filter-group" aria-label="프레임 크기">
              <h3>프레임 크기</h3>
              <ul class="chip-grid">
                <li>
                  <button
                    type="button"
                    data-filter-type="size"
                    data-filter-value="all"
                    data-role="all"
                  >
                    전체
                  </button>
                </li>
                <li>
                  <button
                    class="btn-utility"
                    data-filter-type="size"
                    data-filter-value="S"
                  >
                    S
                  </button>
                </li>
                <li>
                  <button
                    class="btn-utility"
                    data-filter-type="size"
                    data-filter-value="M"
                  >
                    M
                  </button>
                </li>
                <li>
                  <button
                    class="btn-utility"
                    data-filter-type="size"
                    data-filter-value="L"
                  >
                    L
                  </button>
                </li>
              </ul>
            </section>
            <section class="filter-group" aria-label="색상 필터">
              <h3>색상</h3>

              <div class="color-grid">
                <button
                  class="color-dot"
                  data-filter-type="color"
                  data-filter-value="black"
                  aria-label="검정색상 선택"
                ></button>
                <button
                  class="color-dot"
                  data-filter-type="color"
                  data-filter-value="clear"
                  aria-label="투명색상 선택"
                ></button>
                <button
                  class="color-dot"
                  data-filter-type="color"
                  data-filter-value="gold"
                  aria-label="골드색상 선택"
                ></button>
                <button
                  class="color-dot"
                  data-filter-type="color"
                  data-filter-value="silver"
                  aria-label="실버색상 선택"
                ></button>
              </div>
            </section>
            <section class="filter-group" aria-label="가격 필터">
              <h3>가격</h3>

              <div class="price-filter">
                <div class="price-current" aria-live="polite">
                  <span>₩0</span>
                  <span>₩100,000,000</span>
                </div>
                <label for="priceMaxSheet" class="sr-only">최대 가격</label>
                <input
                  type="range"
                  id="priceMaxSheet"
                  min="0"
                  max="53150000"
                  step="10000"
                  value="53150000"
                  aria-label="최대 가격 선택"
                />
              </div>
            </section>
          </div>
          <div class="filter-footer">
            <button class="btn btn--action btn-reset">초기화</button>
            <button class="btn btn--action btn-apply">필터 적용</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 공통 푸터 — loadComponents.js가 components/footer.html을 주입 -->
    <div data-include="components/footer.html"></div>

    <script type="module" src="./js/pages/productList.js"></script>
    <script type="module" src="./js/loadComponents.js"></script>
    <script type="module" src="./js/modules/header.js"></script>
  </body>
</html>
