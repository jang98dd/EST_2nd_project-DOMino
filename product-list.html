<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>가상피팅 & 얼굴형 분석 | ROUNZ</title>
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/normalize.css" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/fitting-and-analysis.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  </head>

  <body>
    <div class="app">
      <header class="header" role="banner">
        <div class="header-inner">
          <div class="header__left">
            <h1 class="header__logo">
              <a href="/index.html" aria-label="ROUNZ 홈">ROUNZ</a>
            </h1>
            <nav class="desktop-nav" aria-label="메인 메뉴">
              <a href="#">스토어</a>
              <a href="#" class="active">가상피팅</a>
              <a href="#">분석</a>
              <a href="#">구매 후기</a>
            </nav>
          </div>

          <div class="header__right">
            <div class="header__actions">
              <button type="button" class="icon-btn" aria-label="검색 열기">
                <span class="material-icons" aria-hidden="true">search</span>
              </button>
              <button type="button" class="icon-btn" aria-label="장바구니, 현재 1개 상품">
                <span class="material-icons" aria-hidden="true">shopping_bag</span>
                <span class="cart-badge" aria-hidden="true">1</span>
              </button>
              <button type="button" class="icon-btn mobile-menu-btn" aria-label="전체 메뉴 열기">
                <span class="material-icons" aria-hidden="true">menu</span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <main class="page page--product-list service-container" role="main">
        <div class="page__inner">
          
          <nav class="page-header mobile-tabs" aria-label="페이지 위치">
            <button type="button" class="tab-btn active" data-target="fitting">피팅</button>
            <button type="button" class="tab-btn" data-target="analysis">비교/분석</button>
          </nav>

          <div class="content-wrapper">
            
            <section id="fitting" class="section-panel active">
              <div class="fitting-grid">
                <div class="preview-container">
                  <div class="preview-box" id="previewBox">
                    <div class="image-frame">
                      <img id="uploadedImage" src="" alt="피팅 이미지" style="display: none" />
                      <div class="glasses-overlay" id="glassesOverlay"></div>
                    </div>
                    <div class="upload-placeholder" id="uploadPlaceholder">
                      <span class="material-icons">add_a_photo</span>
                      <p>사진 업로드</p>
                      <input type="file" id="fileInput" accept="image/*" class="sr-only" />
                    </div>
                  </div>
                  
                  <div class="quick-recommendations">
                    <h4 class="sub-title">추천 결과</h4>
                    <div class="horizontal-products">
                      <div class="prod-item"><span class="mock-glass">👓</span></div>
                      <div class="prod-item"><span class="mock-glass">👓</span></div>
                      <div class="prod-item"><span class="mock-glass">👓</span></div>
                      <div class="prod-item"><span class="mock-glass">👓</span></div>
                      <div class="prod-item"><span class="mock-glass">👓</span></div>
                    </div>
                  </div>
                </div>

                <div class="control-box">
                  <div class="slider-group">
                    <div class="slider-item">
                      <label>X축 위치</label>
                      <input type="range" id="slideX" class="custom-range" min="-150" max="150" value="0" />
                      <span class="val">0px</span>
                    </div>
                    <div class="slider-item">
                      <label>Y축 위치</label>
                      <input type="range" id="slideY" class="custom-range" min="-150" max="150" value="0" />
                      <span class="val">0px</span>
                    </div>
                    <div class="slider-item">
                      <label>크기</label>
                      <input type="range" id="slideScale" class="custom-range" min="50" max="200" value="100" />
                      <span class="val">100%</span>
                    </div>
                    <div class="slider-item">
                      <label>회전</label>
                      <input type="range" id="slideRotate" class="custom-range" min="-180" max="180" value="0" />
                      <span class="val">0°</span>
                    </div>
                  </div>
                  
                  <div class="action-btn-group">
                    <button type="button" class="btn btn-outline" id="btnUploadTrigger">이미지 업로드</button>
                    <button type="button" class="btn btn-outline" id="btnReset">초기화</button>
                    <button type="button" class="btn btn-solid" id="startAnalysisBtn">분석하러 가기</button>
                  </div>
                </div>
              </div>
            </section>

            <section id="analysis" class="section-panel">
              
              <div id="loadingOverlay" class="loading-container" style="display: none;">
                <div class="gauge-box">
                  <h3 class="loading-title">분석 중이에요...</h3>
                  <div class="circle-gauge">
                    <svg width="140" height="140" viewBox="0 0 140 140">
                      <circle cx="70" cy="70" r="60" fill="none" stroke="#eee" stroke-width="6"/>
                      <circle id="progressCircle" cx="70" cy="70" r="60" fill="none" stroke="#0B1E4A" stroke-width="6" 
                              stroke-dasharray="377" stroke-dashoffset="377" stroke-linecap="round" 
                              transform="rotate(-90 70 70)"/>
                    </svg>
                    <p id="progressText">0%</p>
                  </div>
                  <p class="loading-desc">정면 사진으로 얼굴형을 분석합니다.<br>잠시만 기다려주세요.</p>
                </div>
              </div>

              <div class="analysis-grid-wrapper" id="analysisResult">
                
                <div class="analysis-visual-zone">
                  <div class="drag-upload-box">
                    <span class="material-icons">landscape</span>
                    <p>사진 업로드<br>또는 사진 드래그</p>
                  </div>
                  
                  <div class="radar-chart-container">
                    <div class="canvas-holder">
                      <svg viewBox="0 0 100 100" class="svg-radar">
                        <polygon points="50,5 93,36 76,88 24,88 7,36" fill="none" stroke="#E0E0E0" stroke-width="0.5"/>
                        <polygon points="50,16 83,40 70,80 30,80 17,40" fill="none" stroke="#E0E0E0" stroke-width="0.5"/>
                        <polygon points="50,27 73,44 63,71 37,71 27,44" fill="none" stroke="#E0E0E0" stroke-width="0.5"/>
                        <polygon points="50,38 64,48 59,63 41,63 36,48" fill="none" stroke="#E0E0E0" stroke-width="0.5"/>
                        <line x1="50" y1="50" x2="50" y2="5" stroke="#E0E0E0" stroke-width="0.5"/>
                        <line x1="50" y1="50" x2="93" y2="36" stroke="#E0E0E0" stroke-width="0.5"/>
                        <line x1="50" y1="50" x2="76" y2="88" stroke="#E0E0E0" stroke-width="0.5"/>
                        <line x1="50" y1="50" x2="24" y2="88" stroke="#E0E0E0" stroke-width="0.5"/>
                        <line x1="50" y1="50" x2="7" y2="36" stroke="#E0E0E0" stroke-width="0.5"/>
                        <polygon id="radar-data" fill="rgba(11, 30, 74, 0.25)" stroke="#0B1E4A" stroke-width="1.5" points="50,20 80,42 68,75 35,70 22,41"></polygon>
                      </svg>
                      <span class="r-label label-top">밸런스</span>
                      <span class="r-label label-right-top">각진형</span>
                      <span class="r-label label-right-bottom">역삼각형</span>
                      <span class="r-label label-left-bottom">하트형</span>
                      <span class="r-label label-left-top">둥근형</span>
                    </div>
                  </div>
                </div>

                <div class="analysis-info-zone">
                  <div class="result-summary">
                    <span class="info-label">분석 결과</span>
                    <h2 class="info-title" id="resultTitle">달걀형 <span class="accent-text">100%</span></h2>
                    <ul class="info-desc">
                      <li>부드러운 곡선형 프레임 추천</li>
                      <li>달걀형 얼굴과 균형을 이루는 디자인</li>
                    </ul>
                  </div>

                  <div class="product-recommend-section">
                    <h3 class="recommend-title">추천 안경 프레임 라인업</h3>
                    <div class="vertical-recommend-grid">
                      <div class="grid-card"><div class="card-img">🕶️</div></div>
                      <div class="grid-card"><div class="card-img">🕶️</div></div>
                      <div class="grid-card"><div class="card-img">🕶️</div></div>
                    </div>
                    <button type="button" class="btn btn-solid w-100 btn-detail">상세 결과 보기</button>
                  </div>
                </div>

              </div>
            </section>

          </div>
        </div>
      </main>
    </div>
    <script type="module" src="js/pages/fitting-and-analysis.js"></script>
  </body>
</html>
