<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROUNZ - Product Detail</title>

    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/normalize.css" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/product-detail.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="app">
      <header class="header" role="banner">
        <div class="header__left">
          <h1 class="header__logo">
            <a href="/index.html" aria-label="ROUNZ 홈">ROUNZ</a>
          </h1>
        </div>

        <div class="header__right">
          <div class="header__actions">
            <button type="button" class="icon-btn" aria-label="검색 열기">
              <span class="material-icons" aria-hidden="true">search</span>
            </button>

            <button type="button" class="icon-btn" aria-label="장바구니">
              <span class="material-icons" aria-hidden="true"
                >shopping_bag</span
              >
              <span class="cart-badge" aria-hidden="true">1</span>
            </button>

            <button
              type="button"
              class="icon-btn"
              aria-label="전체 메뉴 열기"
              aria-expanded="false"
              aria-controls="global-nav"
            >
              <span class="material-icons" aria-hidden="true">menu</span>
            </button>
          </div>
        </div>
      </header>
      <main class="product-page">
        <div class="page__inner">
          <nav class="page-header" aria-label="페이지 위치">
            <button
              type="button"
              class="back-btn"
              aria-label="이전 페이지로 이동"
            >
              <span class="material-icons" aria-hidden="true"
                >chevron_left</span
              >
            </button>

            <h2 class="page-title">EYEGLASSES</h2>
            <button type="button" class="btn-like" aria-label="찜 하기">
              <span class="material-icons" aria-hidden="true">favorite</span>
            </button>
            <div class="page-header__spacer" aria-hidden="true"></div>
          </nav>
          <section class="product-layout">
            
            <div class="media">
              <img id="mainImage" class="main-img" src="images/product-main.jpg" alt="상품 이미지" />
              <div id="thumbList" class="thumb-list"></div>
            </div>
            
            <div class="info">
              <div class="top-info">
                <p id="brand">ROUNZ</p>
                <h1 id="title">RZ-193 Black</h1>
                <div class="price" id="price">129,000원</div>
              </div>
              
              <div class="options">
                <div class="option-block">
                  <h4>Color</h4>
                  <div id="colors" class="colors"></div>
                </div>

                <div class="option-block">
                  <h4>Size</h4>
                  <button id="sizeBtn" class="select-btn">
                    <span id="sizeText">사이즈 선택</span>
                    <span class="material-icons">expand_more</span>
                  </button>
                  <ul id="sizeList" class="size-list hidden"></ul>
                </div>

                <div class="option-block">
                  <h4>Quantity</h4>
                  <div class="qty">
                    <button class="btn-qty" id="minus">-</button>
                    <input id="qty" value="1" readonly />
                    <button class="btn-qty" id="plus">+</button>
                  </div>
                </div>
              </div>

              <div class="total">
                <span>총 금액</span>
                <strong id="totalPrice">129,000원</strong>
              </div>

              <div class="actions">
                <button class="btn-like-outline"><span class="material-icons">favorite_border</span></button>
                <button class="cart">장바구니 담기</button>
                <button class="buy">바로 구매하기</button>
              </div>
            </div>
            
            <div class="recommend-box">
              <h3>얼굴형 추천</h3>
              <div class="fitting-content">
                <div class="match-accordion">
                  <button type="button" class="match-btn" aria-expanded="false" aria-controls="matchPanel">
                    <span class="match-title">왜 잘 어울릴까요?</span>
                    <span class="material-icons arrow-icon">expand_more</span>
                  </button>

                  <div id="matchPanel" class="match-panel hidden" role="region">
                    <div class="match-content">
                      <p class="highlight-text"></p>
                      <p class="description">
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            
            <div class="fitting-box">
              <h3>가상 피팅</h3>
              <p>내 얼굴에 가상으로 착용해보세요.</p>
              <button class="btn--cta-lg">가상 피팅 시작</button>
            </div>

            <div class="accordion">
              <button class="acc-btn">상세정보</button>
              <div class="panel">디자인 설명 및 상세 스펙 영역입니다.</div>

              <button class="acc-btn">리뷰</button>
              <div class="panel hidden" id="reviews">등록된 리뷰가 없습니다.</div>

              <button class="acc-btn">배송/교환</button>
              <div class="panel hidden">배송 및 교환/반품 안내 정보입니다.</div>
            </div>

          </section>
        </div>
      </main>
    </div>

    <script src="js/product-detail.js"></script>
  </body>
</html>
