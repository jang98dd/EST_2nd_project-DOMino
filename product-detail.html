<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/common.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  </head>
  <body>
    <div class="app">
      <header class="header" role="banner">
        <div class="header__left">
          <h1 class="header__logo">
            <a href="/" aria-label="ROUNZ 홈">ROUNZ</a>
          </h1>
        </div>

        <div class="header__right">
          <div class="header__actions">
            <button type="button" class="icon-btn" aria-label="검색 열기">
              <span class="material-icons" aria-hidden="true">search</span>
            </button>

            <button
              type="button"
              class="icon-btn"
              aria-label="장바구니, 현재 1개 상품"
            >
              <span class="material-icons" aria-hidden="true"
                >shopping_bag</span
              >
              <span class="cart-badge" aria-hidden="true">1</span>
            </button>

            <button
              type="button"
              class="icon-btn"
              aria-label="전체 메뉴 열기"
              aria-expanded="false"
              aria-controls="global-nav"
            >
              <span class="material-icons" aria-hidden="true">menu</span>
            </button>
          </div>
        </div>
      </header>
      <main class="page page--product-list" role="main">
        <div class="page__inner">
          <nav class="page-header" aria-label="페이지 위치">
            <button
              type="button"
              class="back-btn"
              aria-label="이전 페이지로 이동"
            >
              <span class="material-icons" aria-hidden="true"
                >chevron_left</span
              >
            </button>

            <h2 class="page-title"></h2>

            <div class="page-icon">
              <button
                type="button"
                class="btn-like"
                aria-label="찜하기">
                <span class="material-icons">
                  favorite
                </span>
              </button>
              <button
                type="button"
                class="btn-cart"
                aria-label="장바구니">
                <span class="material-icons">
                  shopping_cart
                </span>
              </button>
            </div>
          </nav>
        </div>
      </main>
    </div>
  </body>
</html>
