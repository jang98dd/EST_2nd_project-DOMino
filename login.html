<main class="auth">

  <section class="auth__intro">

    <h2 class="auth__title">
      Find the Frame<br>
      that fits your style.
    </h2>

    <p class="auth__desc">
      당신에게 가장 잘 어울리는 안경을 찾아보세요.
    </p>

  </section>

  <form class="auth-form">

    <div class="form-group">

      <label for="email">
        이메일
      </label>

      <input id="email" type="email" placeholder="이메일을 입력해주세요">

    </div>

    <div class="form-group">

      <label for="password">
        비밀번호
      </label>

      <div class="input-password">

        <input id="password" type="password" placeholder="영문, 숫자, 특수문자 8자 이상">

        <button type="button">
          👁
        </button>

      </div>

    </div>

    <div class="auth-option">

      <label>
        <input type="checkbox">
        로그인 상태 유지
      </label>

      <a href="#">
        비밀번호 찾기
      </a>

    </div>

    <button type="submit" class="btn-login">
      로그인
    </button>

    <div class="divider">
      또는
    </div>

    <div class="social-login">

      <button class="social kakao">
        카카오로 로그인
      </button>

      <button class="social naver">
        네이버로 로그인
      </button>

      <button class="social apple">
        Apple로 로그인
      </button>

    </div>

    <p class="signup-link">

      아직 회원이 아니신가요?

      <a href="#">
        회원가입
      </a>

    </p>

  </form>

</main>
<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/auth.css">
