<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>로그인</title>
  <meta name="description" content="ROUNZ 로그인. 맞춤 안경 추천과 주문 내역, 찜한 상품을 확인하세요.">

  <link rel="stylesheet" href="./styles/reset.css">
  <link rel="stylesheet" href="./styles/normalize.css">
  <link rel="stylesheet" href="./styles/common.css">

  <link rel="stylesheet" href="./styles/header.css">
  <link rel="stylesheet" href="./styles/footer.css">
  
  <link rel="stylesheet" href="./styles/auth-login.css">
  
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body data-page="login">

  <!-- 공통 헤더 — header.js가 #header-root에 주입 -->
  <div id="header-root"></div>

  <main class="login-page">
  
    <div class="login-layout">
  
      <section class="login-content">
  
        <div class="login-title">
  
          <h2>
            Find the Frame<br>
            that fits your style.
          </h2>
  
          <p>
            당신에게 가장 잘 어울리는 안경을 찾아보세요.
          </p>
  
        </div>
  
        <form class="login-form">

        <div class="form-group">

          <label>이메일</label>

          <input type="email" placeholder="이메일을 입력해주세요">

        </div>

        <div class="form-group">

          <label>비밀번호</label>

          <div class="password-wrap">

            <input id="loginPw" type="password" placeholder="비밀번호를 입력해주세요">

            <button type="button" class="toggle-password">

              👁

            </button>

          </div>

        </div>

        <div class="login-option">

          <label>

            <input type="checkbox">

            로그인 상태 유지

          </label>

          <a href="#">
            비밀번호 찾기
          </a>

        </div>

        <button type="submit" class="login-btn">

          로그인

        </button>

      </form>

      <div class="divider">
        <span>또는</span>
      </div>

      <div class="social-login">
      
        <button class="social kakao">
      
          <img src="./assets/images/kakaotalk.png" alt="카카오">
      
          <span>카카오로 로그인</span>
      
        </button>
      
        <button class="social naver">
      
          <img src="./assets/images/naver.png" alt="네이버">
      
          <span>네이버로 로그인</span>
      
        </button>
      
        <button class="social apple">
      
          <img src="./assets/images/apple.png" alt="애플">
      
          <span>Apple로 로그인</span>
      
        </button>
      
      </div>

      <p class="signup-link">

        아직 회원이 아니신가요?

        <a href="./signup.html">
          회원가입
        </a>

      </p>

     </section>
      
      
      </div>
     </main>

    <div data-include="components/footer.html"></div>
    
    <script type="module" src="./js/loadComponents.js"></script>
    <script type="module" src="./js/modules/header.js"></script>
    <script type="module" src="./js/main.js"></script>

</body>

</html>
