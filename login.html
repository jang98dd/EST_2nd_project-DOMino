<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>로그인</title>

  <link rel="stylesheet" href="./styles/header.css">
  <link rel="stylesheet" href="./styles/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body>

  <header class="header">
  
    <h1 class="logo">ROUNZ</h1>
  
    <nav class="gnb">
      <a href="#">상품</a>
      <a href="#">가상피팅</a>
      <a href="#">분석</a>
      <a href="#">브랜드</a>
      <a href="#">이벤트</a>
      <a href="#">고객지원</a>
    </nav>
  
    <div class="header-icons">
  
      <span class="material-symbols-outlined">
        search
      </span>
  
      <span class="material-symbols-outlined">
        shopping_bag
      </span>
  
      <span class="material-symbols-outlined">
        menu
      </span>
  
    </div>
  
  </header>

  <main class="login-page">

    <section class="login-content">

      <div class="login-title">

        <h2>
          Find the Frame<br>
          that fits your style.
        </h2>

        <p>
          당신에게 가장 잘 어울리는 안경을 찾아보세요.
        </p>

      </div>

      <form class="login-form">

        <div class="form-group">

          <label>이메일</label>

          <input type="email" placeholder="이메일을 입력해주세요">

        </div>

        <div class="form-group">

          <label>비밀번호</label>

          <div class="password-wrap">

            <input id="loginPw" type="password" placeholder="비밀번호를 입력해주세요">

            <button type="button" class="toggle-password">

              👁

            </button>

          </div>

        </div>

        <div class="login-option">

          <label>

            <input type="checkbox">

            로그인 상태 유지

          </label>

          <a href="#">
            비밀번호 찾기
          </a>

        </div>

        <button type="submit" class="login-btn">

          로그인

        </button>

      </form>

      <div class="divider">
        <span>또는</span>
      </div>

      <div class="social-login">
      
        <button class="social kakao">
      
          <img src="./assets/images/kakaotalk.png" alt="카카오">
      
          <span>카카오로 로그인</span>
      
        </button>
      
        <button class="social naver">
      
          <img src="./assets/images/naver.png" alt="네이버">
      
          <span>네이버로 로그인</span>
      
        </button>
      
        <button class="social apple">
      
          <img src="./assets/images/apple.png" alt="애플">
      
          <span>Apple로 로그인</span>
      
        </button>
      
      </div>

      <p class="signup-link">

        아직 회원이 아니신가요?

        <a href="./signup.html">
          회원가입
        </a>

      </p>

     </section>
      
     </main>

  <script src="./js/auth.js"></script>

</body>

</html>
