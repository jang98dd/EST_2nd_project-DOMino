<body>

  <header class="header">

    <div class="logo">ROUNZ</div>

    <nav class="gnb">
      <a href="#">상품</a>
      <a href="#">가상피팅</a>
      <a href="#">분석</a>
      <a href="#">브랜드</a>
      <a href="#">이벤트</a>
      <a href="#">고객지원</a>
    </nav>

    <div class="header-icons">

      <button>검색</button>
      <button>장바구니</button>
      <button>메뉴</button>

    </div>

  </header>

  <main class="auth auth--login">

    <section class="auth__intro">

      <h1>
        Find the Frame<br>
        that fits your style.
      </h1>

      <p>
        당신에게 가장 잘 어울리는 안경을 찾아보세요.
      </p>

    </section>

    <section class="auth__form">

      <form>

        <div class="form-group">

          <label>이메일</label>

          <input type="email" placeholder="이메일을 입력해주세요">

        </div>

        <div class="form-group">

          <label>비밀번호</label>

          <div class="password-wrap">

            <input type="password" id="loginPw" placeholder="비밀번호를 입력해주세요">

            <button type="button" class="toggle-password">
              👁
            </button>

          </div>

        </div>

        <div class="login-option">

          <label>
            <input type="checkbox">
            로그인 상태 유지
          </label>

          <a href="#">
            비밀번호 찾기
          </a>

        </div>

        <button class="btn-black">
          로그인
        </button>

      </form>

    </section>

  </main>

  <script src="./js/auth.js"></script>

</body>
