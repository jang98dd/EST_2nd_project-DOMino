<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../styles/reset.css">
  <link rel="stylesheet" href="../styles/normalize.css">
  <link rel="stylesheet" href="../styles/common.css">
   <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
</head>
<body>
  <div class="app">
<header class="header">
  <div class="header__left">
    <h1 class="header__logo">
      <a href="/" aria-label="ROUNZ 홈">ROUNZ</a>
    </h1>
  </div>

  <div class="header__right">
    <div class="header__actions">

      <button class="icon-btn" type="button" aria-label="검색 열기">
        <span class="material-icons" aria-hidden="true">search</span>
      </button>

      <button class="icon-btn" type="button" aria-label="장바구니, 현재 1개 상품">
        <span class="material-icons" aria-hidden="true">shopping_bag</span>
        <span class="cart-badge" aria-hidden="true">1</span>
      </button>

      <button
        class="icon-btn"
        type="button"
        aria-label="메뉴 열기"
        aria-expanded="false"
        aria-controls="global-nav"
      >
        <span class="material-icons" aria-hidden="true">menu</span>
      </button>

    </div>
  </div>
</header>
  </div>
</body>
</html>
