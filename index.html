<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <header class="header">

    <div class="header__left">
      <h1 class="logo">
        <a href="/">ROUNZ</a>
      </h1>
    </div>

    <nav class="gnb">

      <ul class="gnb__list">

        <li class="gnb__item">
          <a href="#">상품</a>
        </li>

        <li class="gnb__item">
          <a href="#">가상피팅</a>
        </li>

        <li class="gnb__item">
          <a href="#">분석</a>
        </li>

        <li class="gnb__item">
          <a href="#">브랜드</a>
        </li>

        <li class="gnb__item">
          <a href="#">이벤트</a>
        </li>

        <li class="gnb__item">
          <a href="#">고객지원</a>
        </li>

      </ul>

    </nav>

    <div class="header__right">

      <button class="icon-btn">
        🔍
      </button>

      <button class="icon-btn">
        🛍️
      </button>

      <button class="menu-btn">
        ☰
      </button>

    </div>

  </header>

  <!-- 메가 메뉴 -->

  <div class="mega-menu">

    <div class="mega-menu__inner">

      <div class="mega-menu__service">

        <h3>추천 서비스</h3>

      </div>

      <div class="mega-menu__category">

        <a href="#">전체 상품</a>
        <a href="#">신상품</a>
        <a href="#">베스트</a>
        <a href="#">안경테</a>
        <a href="#">선글라스</a>

      </div>

    </div>

  </div>

  <!-- 모바일 메뉴 -->

  <aside class="mobile-menu">

    <div class="mobile-menu__header">

      <h2>ROUNZ</h2>

      <button class="close-btn">
        ✕
      </button>

    </div>

    <ul class="mobile-nav">

      <li>

        <button class="accordion">

          상품

          <span>+</span>

        </button>

        <div class="panel">

          <a href="#">전체 상품</a>
          <a href="#">신상품</a>
          <a href="#">베스트</a>

        </div>

      </li>

      <li>

        <button class="accordion">

          브랜드

          <span>+</span>

        </button>

        <div class="panel">

          <a href="#">전체 브랜드</a>
          <a href="#">인기 브랜드</a>

        </div>

      </li>

    </ul>

  </aside>

  <script type="module" src="./js/main.js"></script>

</body>
</html>
