<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROUNZ</title>

  <link rel="stylesheet" href="styles/reset.css" />
  <link rel="stylesheet" href="styles/normalize.css" />
  <link rel="stylesheet" href="styles/common.css" />
  <!-- <link rel="stylesheet" href="styles/home.css" /> -->

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>

<body data-page="home">
  <div class="app">

    <!-- 공통 헤더 컴포넌트 자리 -->

    <main role="main">

      <!-- 1. HERO -->
      <section class="hero" aria-label="브랜드 영상 배너">
        <div class="hero__carousel swiper" data-hero-swiper>

          <div class="swiper-wrapper">

            <div class="swiper-slide">
              <div class="hero__video">
                <iframe
                  class="hero__iframe"
                  src="https://www.youtube.com/embed/8UpMctZ0e74?enablejsapi=1&amp;controls=0&amp;playsinline=1&amp;rel=0&amp;mute=1"
                  title="LE SPECS"
                  frameborder="0"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  referrerpolicy="strict-origin-when-cross-origin"
                  allowfullscreen
                ></iframe>
              </div>
            </div>

            <div class="swiper-slide">
              <div class="hero__video">
                <iframe
                  class="hero__iframe"
                  src="https://www.youtube.com/embed/Ph5ZnFPYeZg?enablejsapi=1&amp;controls=0&amp;playsinline=1&amp;rel=0&amp;mute=1"
                  title="CARIN"
                  frameborder="0"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  referrerpolicy="strict-origin-when-cross-origin"
                  allowfullscreen
                ></iframe>
              </div>
            </div>

            <div class="swiper-slide">
              <div class="hero__video">
                <iframe
                  class="hero__iframe"
                  src="https://www.youtube.com/embed/msfGAtyEi58?enablejsapi=1&amp;controls=0&amp;playsinline=1&amp;rel=0&amp;mute=1"
                  title="PUBLIC BEACON"
                  frameborder="0"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  referrerpolicy="strict-origin-when-cross-origin"
                  allowfullscreen
                ></iframe>
              </div>
            </div>

            <div class="swiper-slide">
              <div class="hero__video">
                <iframe
                  class="hero__iframe"
                  src="https://www.youtube.com/embed/ZqzRmbHyGHc?enablejsapi=1&amp;controls=0&amp;playsinline=1&amp;rel=0&amp;mute=1"
                  title="PUBLIC BEACON"
                  frameborder="0"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  referrerpolicy="strict-origin-when-cross-origin"
                  allowfullscreen
                ></iframe>
              </div>
            </div>

            <div class="swiper-slide">
              <div class="hero__video">
                <iframe
                  class="hero__iframe"
                  src="https://www.youtube.com/embed/VczU0X342MI?enablejsapi=1&amp;controls=0&amp;playsinline=1&amp;rel=0&amp;mute=1"
                  title="RAY-BAN"
                  frameborder="0"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  referrerpolicy="strict-origin-when-cross-origin"
                  allowfullscreen
                ></iframe>
              </div>
            </div>

          </div>

          <!-- 슬라이드 진행바 -->
          <div class="hero__pagination swiper-pagination"></div>

        </div>

        <!-- 커스텀 컨트롤 -->
        <div class="hero__controls">
          <button type="button" class="hero__control" data-action="play" aria-label="영상 재생">
            <span class="material-icons" aria-hidden="true">play_arrow</span>
          </button>
          <button type="button" class="hero__control" data-action="mute" aria-label="음소거 해제">
            <span class="material-icons" aria-hidden="true">volume_off</span>
          </button>
        </div>
      </section>

      <!-- 2. CATEGORY  -->
      <section class="category section" aria-labelledby="category-title">
        <div class="page">

          <h2 class="category__title font-h1" id="category-title">Category</h2>

          <ul class="category__grid grid grid--2">
            <li>
              <a class="category__item" href="product-list.html" data-shape="round">
                <img class="category__icon" src="assets/icons/shape_1.png" alt="" />
                <span class="category__label">라운드</span>
              </a>
            </li>
            <li>
              <a class="category__item" href="product-list.html" data-shape="square">
                <img class="category__icon" src="assets/icons/shape_2.png" alt="" />
                <span class="category__label">스퀘어</span>
              </a>
            </li>
            <li>
              <a class="category__item" href="product-list.html" data-shape="browline">
                <img class="category__icon" src="assets/icons/shape_3.png" alt="" />
                <span class="category__label">하금테</span>
              </a>
            </li>
            <li>
              <a class="category__item" href="product-list.html" data-shape="goggle">
                <img class="category__icon" src="assets/icons/shape_4.png" alt="" />
                <span class="category__label">고글</span>
              </a>
            </li>
            <li>
              <a class="category__item" href="product-list.html" data-shape="mix">
                <img class="category__icon" src="assets/icons/shape_5.png" alt="" />
                <span class="category__label">믹스</span>
              </a>
            </li>
            <li>
              <a class="category__item" href="product-list.html" data-shape="aviator">
                <img class="category__icon" src="assets/icons/shape_6.png" alt="" />
                <span class="category__label">보잉</span>
              </a>
            </li>
            <li>
              <a class="category__item" href="product-list.html" data-shape="cat-eye">
                <img class="category__icon" src="assets/icons/shape_7.png" alt="" />
                <span class="category__label">캣아이</span>
              </a>
            </li>
            <li>
              <a class="category__item" href="product-list.html" data-shape="other">
                <img class="category__icon" src="assets/icons/shape_8.png" alt="" />
                <span class="category__label">기타</span>
              </a>
            </li>
          </ul>

          <!-- KIDS / 안경테 보기 -->
          <div class="category__links grid grid--2">
            <!-- 링크 대상 결정 시 href 작성 필요 -->
            <a class="btn category__kids" href="#">KIDS</a>
            <!-- 링크 대상 결정 시 href 작성 필요 -->
            <a class="btn category__viewall" href="#">
              안경테 보기
              <span class="material-icons" aria-hidden="true">chevron_right</span>
            </a>
          </div>

          <!-- 얼굴형 분석 / 안경 써보기 -->
          <div class="category__cta grid grid--2">
            <a class="btn category__cta-btn category__cta-btn--analysis" href="analysis.html">
              <img class="category__cta-icon" src="assets/icons/face.png" alt="" />
              얼굴형 분석
            </a>
            <a class="btn category__cta-btn category__cta-btn--fitting" href="fitting.html">
              <img class="category__cta-icon" src="assets/icons/wear.png" alt="" />
              안경 써보기
            </a>
          </div>

        </div>
      </section>

      <!-- 3. BEST PICK -->
      <section class="best-pick section" aria-labelledby="best-pick-title">
        <h2 class="section-bar" id="best-pick-title">Best Pick</h2>

        <div class="page">

          <!-- 탭 (키보드 좌/우·Home/End 전환은 JS) -->
          <div class="best-pick__tabs" role="tablist" aria-label="브랜드별 베스트">
            <button type="button" role="tab" id="bp-tab-all" class="best-pick__tab is-active" aria-selected="true" aria-controls="bp-panel" data-brand="all">ALL</button>
            <button type="button" role="tab" id="bp-tab-rayban" class="best-pick__tab" aria-selected="false" aria-controls="bp-panel" tabindex="-1" data-brand="RAY-BAN">RAY-BAN</button>
            <button type="button" role="tab" id="bp-tab-fakeme" class="best-pick__tab" aria-selected="false" aria-controls="bp-panel" tabindex="-1" data-brand="FAKEME">FAKEME</button>
            <button type="button" role="tab" id="bp-tab-nineaccord" class="best-pick__tab" aria-selected="false" aria-controls="bp-panel" tabindex="-1" data-brand="NINE ACCORD">NINE ACCORD</button>
            <button type="button" role="tab" id="bp-tab-nishide" class="best-pick__tab" aria-selected="false" aria-controls="bp-panel" tabindex="-1" data-brand="NISHIDE KAZUO">NISHIDE KAZUO</button>
            <button type="button" role="tab" id="bp-tab-publicbeacon" class="best-pick__tab" aria-selected="false" aria-controls="bp-panel" tabindex="-1" data-brand="PUBLIC BEACON">PUBLIC BEACON</button>
            <button type="button" role="tab" id="bp-tab-heister" class="best-pick__tab" aria-selected="false" aria-controls="bp-panel" tabindex="-1" data-brand="HEISTER">HEISTER</button>
            <button type="button" role="tab" id="bp-tab-bliz" class="best-pick__tab" aria-selected="false" aria-controls="bp-panel" tabindex="-1" data-brand="BLIZ">BLIZ</button>
            <button type="button" role="tab" id="bp-tab-museum" class="best-pick__tab" aria-selected="false" aria-controls="bp-panel" tabindex="-1" data-brand="MUSEUM BY BEACON">MUSEUM BY BEACON</button>
            <button type="button" role="tab" id="bp-tab-rudy" class="best-pick__tab" aria-selected="false" aria-controls="bp-panel" tabindex="-1" data-brand="RUDY PROJECT">RUDY PROJECT</button>
            <button type="button" role="tab" id="bp-tab-oakley" class="best-pick__tab" aria-selected="false" aria-controls="bp-panel" tabindex="-1" data-brand="OAKLEY">OAKLEY</button>
          </div>

          <!-- 상품 패널 -->
          <div class="best-pick__panel" id="bp-panel" role="tabpanel" aria-labelledby="bp-tab-all">

            <!-- 가로 캐러셀: 활성 탭 상품을 JS가 .swiper-slide 카드로 렌더, 더보기 시 append -->
            <div class="best-pick__carousel swiper" data-bestpick-swiper>
              <div class="swiper-wrapper">
                <!-- 상품 카드는 JS가 products.json에서 렌더 -->
              </div>
              <!-- 얇은 가로 스크롤바 -->
              <div class="best-pick__scrollbar swiper-scrollbar"></div>
            </div>

            <!-- 로딩 중 스켈레톤 (로드되면 JS가 숨김) -->
            <div class="best-pick__skeleton grid grid--2" aria-hidden="true">
              <article class="skeleton-card"></article>
              <article class="skeleton-card"></article>
              <article class="skeleton-card"></article>
              <article class="skeleton-card"></article>
            </div>

            <!-- 불러오기 실패 시 JS가 표시 (문구 조정 가능) -->
            <div class="best-pick__error" role="alert" hidden>
              <p>상품을 불러오지 못했어요.</p>
              <button type="button" class="btn" data-action="retry">다시 시도</button>
            </div>

          </div>

          <!-- 더 보기: 같은 탭 상품을 추가 로드 후 새 카드로 자동 이동(JS). 다 나오면 숨김 -->
          <button type="button" class="btn btn-more" data-action="load-more">
            더 보기
            <span class="material-icons" aria-hidden="true">chevron_right</span>
          </button>

        </div>
      </section>

    </main>

    <!-- ===== 공통 푸터 컴포넌트 자리 ===== -->

  </div>

  <!-- Swiper -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script type="module" src="./js/main.js"></script>
</body>

</html>
